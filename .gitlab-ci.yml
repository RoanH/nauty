image: eclipse-temurin:25

variables:
  SUFFIX: ${CI_PIPELINE_ID}-${CI_COMMIT_REF_NAME}
  PROJECTNAME: nauty

before_script:
  - java -version
  - cd "${PROJECTNAME}"
  - ls -l
  - chmod -R 755 ./*
  - sed -i 's|https\\://services.gradle.org/distributions|http\\://roanh.dev:100/gradle|' gradle/wrapper/gradle-wrapper.properties

stages:
  - check
  - compile
  - test
  - javadoc
  - publishing

endings:
  image: bash:5.3.9
  allow_failure: true
  before_script: []
  script: wget -q -O - ${SERVER}ci/lf.sh | bash
  stage: check

sonar:
  allow_failure: true
  script:
    - ./gradlew -PrefName=${CI_COMMIT_REF_NAME} -PnexusPublic=${NEXUS_PUBLIC} assemble
    - ./gradlew -PrefName=${CI_COMMIT_REF_NAME} -PnexusPublic=${NEXUS_PUBLIC} test jacocoTestReport
    - ./gradlew -PrefName=${CI_COMMIT_REF_NAME} -PnexusPublic=${NEXUS_PUBLIC} sonar
  stage: check
  only:
    - master

spotbugs:
  allow_failure: true
  script: ./gradlew -PrefName=${CI_COMMIT_REF_NAME} -PnexusPublic=${NEXUS_PUBLIC} spotbugsMain
  stage: check
  artifacts:
    name: SpotBugs-${SUFFIX}
    expire_in: 1 day
    when: always
    paths:
      - ./${PROJECTNAME}/build/reports/spotbugs/main/spotbugs.html

verify:
  image: bash:5.3.9
  allow_failure: true
  before_script: []
  script:
    - cd nauty/src/dev/roanh/nauty/api
    - wget -q -O - ${SERVER}ci/javadoc.sh | bash
  stage: javadoc
  coverage: '/\([0-9]{2,3}\.[0-9]{2}%\)/'

javadoc:
  script:
    - ./gradlew -PrefName=${CI_COMMIT_REF_NAME} -PnexusPublic=${NEXUS_PUBLIC} javadoc
    - mv ./build/docs/javadoc ../
  stage: javadoc
  artifacts:
    name: Javadoc-${SUFFIX}
    expire_in: 1 day
    paths:
      - javadoc/

compile:
  script:
    - ./gradlew -PrefName=${CI_COMMIT_REF_NAME} -PnexusPublic=${NEXUS_PUBLIC} :jar
    - mv ./build/libs/*.jar ../nauty.jar
  stage: compile
  artifacts:
    name: nauty-${SUFFIX}
    expire_in: 1 day
    paths:
      - nauty.jar

test:
  script:
    - ./gradlew -PrefName=${CI_COMMIT_REF_NAME} -PnexusPublic=${NEXUS_PUBLIC} :test :jacocoTestReport
    - cat ./build/reports/jacoco/test/html/index.html
  stage: test
  coverage: '/Total.*?([0-9]{1,3})%/'
  artifacts:
    reports:
      junit: ./${PROJECTNAME}/build/test-results/test/TEST-*.xml

publish:
  allow_failure: false
  script: ./gradlew -PrefName=${CI_COMMIT_REF_NAME} publishAllPublicationsToMavenRepository
  when: manual
  stage: publishing
  tags:
    - maven_central
  only:
    - tags

staging:
  image: curlimages/curl:8.19.0
  before_script: []
  script: 'curl --request POST -H "Authorization: Bearer ${CENTRAL_PORTAL_TOKEN}" https://ossrh-staging-api.central.sonatype.com/manual/upload/defaultRepository/dev.roanh.nauty'
  stage: publishing
  tags:
    - maven_central
  needs:
    - publish
  only:
    - tags
